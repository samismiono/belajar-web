<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Saya</title>

    <!-- Bagian CSS untuk menghias tampilan web -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        h2 {
            color: #34495e;
            margin-top: 25px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #555555;
        }

        .btn-modern {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin: 10px 0;
            display: inline-block;
        }

        .btn-modern:hover {
            background-color: #2980b9;
        }

        img {
            display: block;
            max-width: 100px;
            height: auto;
            margin-top: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <h1>Halo dunia, ini kode pertama saya!</h1>
    <h1>Selamat datang di Website saya</h1>

    <p>Ini adalah paragraf pertama saya yang ditulis langsung dari VS Code.</p>

    <!-- Tombol Pertama -->
    <div>
        <button class="btn-modern">Klik di sini</button>
    </div>

    <!-- Bagian Teks Berwarna Biru -->
    <h2 style="color: #3498db;">Teks ini berwarna biru!</h2>
    <h2>Lihat gambar ini:</h2>

    <!-- Gambar Sketsa -->
    <img src="Sketsa.png" alt="Sketsa Balon Udara">

    <!-- Tombol Interaktif dengan Javascript -->
    <div>
        <button class="btn-modern" onclick="alert('Halo Samuel! Tombol ini berhasil diklik')">
            Coba Klik Tombol Ini
        </button>
    </div>

</body>

</html>
